worker_processes auto;
events { worker_connections 1024; }
http {
  sendfile on;
  server {
    listen 80;

    location /api/auth/ {
      proxy_pass http://auth:8000/;
    }
    location /api/products/ {
      # Preserve service router prefix (/products)
      proxy_pass http://products:8000/;
      # proxy_pass http://products:8000/;
    }
    location /api/survey/ {
      proxy_pass http://survey:8000/;
    }
    location /api/content/ {
      proxy_pass http://content:8000/;
    }
    location /api/projects/ {
      proxy_pass http://projects:8000/;
    }
    location /api/stats/ {
      proxy_pass http://stats:8000/;
    }

    location /static/ {
      proxy_pass http://media:8000/static/;
    }
  }
}

